{% load djicons i18n %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Calllog" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-call_log-form"
          hx-post="{% url 'voip:call_log_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Caller Number" %}</label>
            <input type="text" name="caller_number" class="input input-sm w-full" placeholder="{% trans 'Caller Number' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Callee Number" %}</label>
            <input type="text" name="callee_number" class="input input-sm w-full" placeholder="{% trans 'Callee Number' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Direction" %}</label>
            <input type="text" name="direction" class="input input-sm w-full" placeholder="{% trans 'Direction' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Started At" %}</label>
            <input type="datetime-local" name="started_at" class="input input-sm w-full">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Duration Seconds" %}</label>
            <input type="number" name="duration_seconds" class="input input-sm w-full"  placeholder="0">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Agent Id" %}</label>
            <input type="text" name="agent_id" class="input input-sm w-full" placeholder="{% trans 'Agent Id' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Recording Url" %}</label>
            <input type="url" name="recording_url" class="input input-sm w-full" placeholder="https://">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Notes" %}</label>
            <textarea name="notes" class="textarea textarea-sm w-full" rows="3"></textarea>
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-call_log-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
